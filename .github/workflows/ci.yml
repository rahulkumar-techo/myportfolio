name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint • Typecheck • Test • Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      # Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      # Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint
      - name: Run ESLint
        run: pnpm exec eslint .

      # TypeScript type check
      - name: Run TypeScript type check
        run: pnpm exec tsc --noEmit

      # Run tests (only if test script exists)
      - name: Run tests
        shell: bash
        run: |
          if pnpm run | grep -qE '^[[:space:]]+test($|:)'; then
            pnpm test -- --runInBand
          else
            echo "No test script found. Skipping tests."
          fi

      # Build Next.js
      - name: Build Next.js application
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
        run: pnpm build

      # Security audit
      - name: Run dependency security audit
        continue-on-error: true
        run: pnpm audit --prod --audit-level high

      # Build Docker if Dockerfile exists
      - name: Build Docker image
        shell: bash
        run: |
          if [ -f Dockerfile ]; then
            docker build -t portfolio:${{ github.sha }} .
          else
            echo "No Dockerfile found. Skipping Docker build."
          fi

  notify-failure:
    name: Notify on CI failure
    runs-on: ubuntu-latest
    needs: build-test
    if: failure()

    steps:
      # Comment on PR
      - name: Comment on pull request failure
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `
            ❌ CI failed for this pull request.

            Workflow: ${context.workflow}
            Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            Commit: ${context.sha}
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      # Send email notification
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ CI Failed - ${{ github.repository }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub CI
          body: |
            GitHub CI workflow failed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Workflow: ${{ github.workflow }}

            Commit: ${{ github.sha }}

            View details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}