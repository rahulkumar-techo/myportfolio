name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm exec eslint .

      - name: Run TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Run tests if present
        shell: bash
        run: |
          if pnpm run | grep -qE '^[[:space:]]+test($|:)'; then
            pnpm test -- --runInBand
          else
            echo "No test script found. Skipping tests."
          fi

      - name: Generate Prisma client
        shell: bash
        run: |
          if [ -f prisma/schema.prisma ]; then
            pnpm exec prisma generate
          else
            echo "No prisma/schema.prisma found. Skipping Prisma client generation."
          fi

      - name: Build Next.js application
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
        run: pnpm build

      - name: Run dependency security audit
        continue-on-error: true
        run: pnpm audit --prod --audit-level high

      - name: Build Docker image if Dockerfile exists
        shell: bash
        run: |
          if [ -f Dockerfile ]; then
            docker build \
              --file Dockerfile \
              --tag portfolio:${{ github.sha }} \
              --tag portfolio:ci \
              .
          else
            echo "No Dockerfile found. Skipping Docker build."
          fi

      # Future deployment stage can be added here once registry and environment secrets are ready.
      # - name: Log in to container registry
      #   run: echo "Add registry login here"
      #
      # - name: Push Docker image
      #   run: echo "Add docker push here"

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs:
      - build-test
    if: failure()

    steps:
      - name: Comment on pull request failure
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              'CI failed for this pull request.',
              '',
              `Workflow: ${context.workflow}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: ${context.sha}`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Send failure webhook notification
        if: ${{ secrets.FAILURE_WEBHOOK_URL != '' }}
        env:
          FAILURE_WEBHOOK_URL: ${{ secrets.FAILURE_WEBHOOK_URL }}
        shell: bash
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "GitHub Actions CI failed",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "workflow": "${{ github.workflow }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "commit": "${{ github.sha }}"
          }
          JSON
          )
          curl -X POST -H "Content-Type: application/json" -d "$payload" "$FAILURE_WEBHOOK_URL"
