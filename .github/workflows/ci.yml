name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm exec eslint .

      - name: Run TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Run tests if present
        shell: bash
        run: |
          if pnpm run | grep -qE '^[[:space:]]+test($|:)'; then
            pnpm test -- --runInBand
          else
            echo "No test script found. Skipping tests."
          fi

      - name: Generate Prisma client
        shell: bash
        run: |
          if [ -f prisma/schema.prisma ]; then
            pnpm exec prisma generate
          else
            echo "No prisma/schema.prisma found. Skipping Prisma client generation."
          fi

      - name: Build Next.js application
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
        run: pnpm build

      - name: Run dependency security audit
        continue-on-error: true
        run: pnpm audit --prod --audit-level high

      - name: Build Docker image if Dockerfile exists
        shell: bash
        run: |
          if [ -f Dockerfile ]; then
            docker build \
              --file Dockerfile \
              --tag portfolio:${{ github.sha }} \
              --tag portfolio:ci \
              .
          else
            echo "No Dockerfile found. Skipping Docker build."
          fi

      # Future deployment stage can be added here once registry and environment secrets are ready.
      # - name: Log in to container registry
      #   run: echo "Add registry login here"
      #
      # - name: Push Docker image
      #   run: echo "Add docker push here"

  notify-failure:
    name: Telegram notification
    runs-on: ubuntu-latest
    needs:
      - build-test
    if: failure() && secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != ''

    steps:
      - name: Send Telegram failure notification
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          message="❌ CI failed%0ARepository: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0AWorkflow: ${{ github.workflow }}%0ACommit: ${{ github.sha }}%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$message"
