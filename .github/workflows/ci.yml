name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Wait for MongoDB
        shell: bash
        run: |
          for i in {1..30}; do
            if bash -c "</dev/tcp/127.0.0.1/27017" >/dev/null 2>&1; then
              echo "MongoDB is ready"
              exit 0
            fi
            echo "Waiting for MongoDB..."
            sleep 2
          done
          echo "MongoDB did not become ready in time"
          exit 1

      - name: Run ESLint
        run: pnpm exec eslint .

      - name: Run TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Run tests if present
        shell: bash
        run: |
          if pnpm run | grep -qE '^[[:space:]]+test($|:)'; then
            pnpm test
          else
            echo "No test script found. Skipping tests."
          fi

      - name: Build Next.js application
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
          MONGODB_URI: mongodb://127.0.0.1:27017/portfolio-ci
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-nextauth-secret
          JWT_SECRET: ci-jwt-secret
          GOOGLE_CLIENT_ID: ci-google-client-id
          GOOGLE_CLIENT_SECRET: ci-google-client-secret
        run: pnpm build

      - name: Run dependency security audit
        continue-on-error: true
        run: pnpm audit --prod --audit-level high

      - name: Build Docker image if Dockerfile exists
        shell: bash
        run: |
          if [ -f Dockerfile ]; then
            docker build \
              --file Dockerfile \
              --tag portfolio:${{ github.sha }} \
              --tag portfolio:ci \
              .
          else
            echo "No Dockerfile found. Skipping Docker build."
          fi

      # Future deployment stage can be added here once registry and environment secrets are ready.
      # - name: Log in to container registry
      #   run: echo "Add registry login here"
      #
      # - name: Push Docker image
      #   run: echo "Add docker push here"
